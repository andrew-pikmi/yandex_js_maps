name: yandex_js_maps
description: A Flutter Web plugin for integrating Yandex Maps JS API using Dart JS interop.
version: 2.0.0

environment:
  sdk: '>=3.4.3 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: YandexJsMapsWeb
        fileName: yandex_js_maps_web.dart
